version: '3.8'

services:
  backend:
    build: ./back_end
    container_name: backend
    expose:
      - "25000"   # 🔒 privado
    networks:
      - app-network

  frontend:
    build: ./front_end
    container_name: frontend
    ports:
      - "8080:3000"  # 🌐 público
    environment:
      - BACKEND_URL=http://backend:25000
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network: